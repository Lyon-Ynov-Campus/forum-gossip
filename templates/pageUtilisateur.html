<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/utilisateur.css">
    <title>Document</title>
</head>
<body>
    <div class="logo">GOSS'IP TEA</div>
    <div class="profile-top">
        <img src="{{.Avatar}}">
        <div class="tabs">
            <form action="/update-user" method="POST" id="update-form"></form>
            <button type="submit" form="update-form" class="btn-modifier">Modifier</button>
            <a href="/" class="btn-retour">Retour accueil</a>
            <form action="/logout" method="POST" style="display:inline;">
                <button type="submit" class="btn-deconnexion">Se déconnecter</button>
            </form>
        </div>
    </div>

    <div class="fields">
        <input type="text" name="username" value="{{.Username}}" form="update-form">
        <input type="password" name="password" placeholder="Nouveau mot de passe" form="update-form">
        <input type="email" name="email" value="{{.Email}}" form="update-form">
        <input type="text" name="avatar" value="{{.Avatar}}" placeholder="URL image avatar" form="update-form">
    </div>

    <form action="/delete-account" method="POST">
        <button class="btn-delete">Supprimer mon compte</button>
    </form>

</body>
</html>
