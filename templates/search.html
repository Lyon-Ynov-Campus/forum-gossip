<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/search.css">
    <title>Recherche Goss'ip Tea</title>
</head>
<body>
    <div class="topbar">
        <div class="logo">GOSS'IP TEA</div>
        <a href="/" class="btn-retour">Retour</a>
    </div>

    <form action="/search" method="GET" class="search-form">
        <div class="search-bar">
            <span class="search-icon">Recherche</span>
            <input type="text" name="q" value="{{.Query}}" placeholder="Recherches profils..." autofocus>
        </div>
    </form>

    <div class="results">
        {{if .Users}}
            {{range .Users}}
            <div class="profile-card">
                <img src="{{.Avatar}}" alt="avatar">
                <div class="profile-info">
                    <span class="profile-name">{{.Username}}</span>
                    <div class="profile-stats">
                        <span>{{.NbPosts}} posts</span>
                        <span>{{.NbLikes}} likes</span>
                        <span>{{.NbComments}} commentaires</span>
                    </div>
                </div>
            </div>
            {{end}}
        {{else}}
            <p class="no-result">Aucun profil trouvé{{if .Query}} pour "{{.Query}}"{{end}}</p>
        {{end}}
    </div>
</body>
</html>
